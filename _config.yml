# Site Settings
title: "The Infinite Pause"
tagline: "Shiva. Shakti. Beyond Time."
description: "Experience the stillness of Shiva and the power of Shakti. A cinematic journey through the Shri Rudrashtakam and ancient Vedic resonance."
url: "https://theinfinitepause.github.io"
author: "The Infinite Pause"

# Build Settings
theme: minima
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO & Social Metadata
social:
  name: The Infinite Pause
  links:
    - https://www.youtube.com/channel/UCu5KQpf_mXvtZQNXT5lFlhw
    - https://in.pinterest.com/theinfinitepause
    - https://www.instagram.com/thelastwitness_tip/reels/

# Minima Theme Configuration
minima:
  skin: dark
  # This tells the site to use your custom gold/black style
  custom_css:
    - assets/css/custom.css
  social_links:
    - { platform: youtube, user_url: "https://www.youtube.com/channel/UCu5KQpf_mXvtZQNXT5lFlhw" }
    - { platform: pinterest, user_url: "https://in.pinterest.com/theinfinitepause" }
    - { platform: instagram, user_id: "thelastwitness_tip" }

# Navigation Settings
header_pages:
  - about.md
  - index.md

# Content Settings
show_excerpts: true
paginate: 5
